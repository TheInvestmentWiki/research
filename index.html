<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheInvestmentWiki</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 32px;
        }

        header {
            padding: 96px 0 52px;
            border-bottom: 1px solid #e5e5e5;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 17px;
            color: #666;
            line-height: 1.5;
        }

        .stats {
            display: flex;
            gap: 32px;
            margin-top: 24px;
            font-size: 15px;
            color: #999;
        }

        .stats span strong {
            color: #1a1a1a;
            font-weight: 600;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 16px;
        }

        input[type="text"] {
            flex: 1;
            max-width: 340px;
            padding: 10px 14px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: 16px;
            font-family: inherit;
            color: #1a1a1a;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #1a1a1a;
        }

        input[type="text"]::placeholder {
            color: #bbb;
        }

        .toolbar a {
            font-size: 15px;
            color: #666;
            text-decoration: none;
            white-space: nowrap;
        }

        .toolbar a:hover {
            color: #1a1a1a;
        }

        /* File list */
        .files {
            list-style: none;
        }

        .files li {
            border-bottom: 1px solid #f0f0f0;
        }

        .files li:first-child {
            border-top: 1px solid #f0f0f0;
        }

        .files a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 17px;
            transition: color 0.15s;
        }

        .files a:hover {
            color: #0066cc;
        }

        .files .meta {
            font-size: 14px;
            color: #bbb;
            font-variant-numeric: tabular-nums;
        }

        /* States */
        .loading, .empty, .error {
            padding: 80px 0;
            text-align: center;
            font-size: 16px;
            color: #999;
        }

        .config-notice {
            background: #fffbeb;
            border: 1px solid #f0e6c0;
            border-radius: 6px;
            padding: 18px;
            margin-bottom: 28px;
            font-size: 15px;
            color: #92700c;
            line-height: 1.6;
        }

        .config-notice code {
            font-family: SFMono-Regular, Menlo, monospace;
            font-size: 14px;
            background: rgba(0,0,0,0.05);
            padding: 1px 5px;
            border-radius: 3px;
        }

        footer {
            padding: 36px 0;
            margin-top: 72px;
            border-top: 1px solid #e5e5e5;
            font-size: 14px;
            color: #bbb;
            display: flex;
            justify-content: space-between;
        }

        footer a {
            color: #999;
            text-decoration: none;
        }

        footer a:hover {
            color: #1a1a1a;
        }

        /* Scale up for large monitors */
        @media (min-width: 1400px) {
            .container { max-width: 1100px; }
            h1 { font-size: 42px; }
            .subtitle { font-size: 18px; }
            .stats { font-size: 16px; }
            .files a { font-size: 18px; padding: 22px 0; }
            .files .meta { font-size: 15px; }
            input[type="text"] { font-size: 17px; padding: 12px 16px; max-width: 400px; }
            .toolbar a { font-size: 16px; }
        }

        @media (min-width: 1800px) {
            .container { max-width: 1280px; }
            h1 { font-size: 48px; }
            .subtitle { font-size: 19px; }
            .files a { font-size: 20px; padding: 24px 0; }
            .files .meta { font-size: 16px; }
        }

        @media (max-width: 480px) {
            header { padding: 48px 0 32px; }
            h1 { font-size: 28px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            input[type="text"] { max-width: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TheInvestmentWiki</h1>
            <p class="subtitle">Open source equity research, maintained by the community.</p>
            <div class="stats">
                <span><strong id="file-count">—</strong> reports</span>
                <span><strong id="contributor-count">—</strong> contributors</span>
                <span>updated <strong id="last-updated">—</strong></span>
            </div>
        </header>

        <div class="toolbar">
            <input type="text" id="search" placeholder="Search..." oninput="filterFiles()">
            <a id="contribute-link" href="#" target="_blank">+ Add research</a>
        </div>

        <div class="config-notice" id="config-notice" style="display:none;">
            Set <code>REPO_OWNER</code> and <code>REPO_NAME</code> at the bottom of this file to connect to your GitHub repo.
        </div>

        <div id="file-list">
            <div class="loading">Loading...</div>
        </div>

        <footer>
            <span>TheInvestmentWiki</span>
            <a id="github-link" href="#" target="_blank">GitHub</a>
        </footer>
    </div>

    <script>
        // ============================================================
        //  CONFIGURATION
        // ============================================================
        const REPO_OWNER = 'TheInvestmentWiki';
        const REPO_NAME  = 'research';
        // ============================================================

        const API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
        const BASE = `https://${REPO_OWNER}.github.io/${REPO_NAME}/`;

        let allFiles = [];

        document.getElementById('contribute-link').href = `https://github.com/${REPO_OWNER}/${REPO_NAME}`;
        document.getElementById('github-link').href = `https://github.com/${REPO_OWNER}/${REPO_NAME}`;

        async function loadFiles() {
            const el = document.getElementById('file-list');

            if (REPO_OWNER === 'YOUR_GITHUB_USERNAME') {
                document.getElementById('config-notice').style.display = 'block';
                el.innerHTML = '';
                return;
            }

            try {
                const res = await fetch(API, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
                if (!res.ok) throw new Error(res.status);
                const data = await res.json();

                allFiles = data.filter(f => f.name.endsWith('.html') && f.name.toLowerCase() !== 'index.html');
                document.getElementById('file-count').textContent = allFiles.length;

                try {
                    const c = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/commits?per_page=1`);
                    if (c.ok) {
                        const commits = await c.json();
                        if (commits[0]) {
                            document.getElementById('last-updated').textContent = new Date(commits[0].commit.committer.date)
                                .toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        }
                    }
                } catch(e) {}

                try {
                    const r = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contributors?per_page=100`);
                    if (r.ok) document.getElementById('contributor-count').textContent = (await r.json()).length;
                } catch(e) {}

                renderFiles(allFiles);
            } catch (e) {
                el.innerHTML = '<div class="error">Could not load files. Check that the repo is public.</div>';
            }
        }

        function renderFiles(files) {
            const el = document.getElementById('file-list');
            if (!files.length) {
                el.innerHTML = '<div class="empty">No reports yet.</div>';
                return;
            }

            const ul = document.createElement('ul');
            ul.className = 'files';

            files.forEach(f => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = BASE + f.name;
                a.target = '_blank';

                const name = f.name.replace('.html', '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                const size = f.size > 1024 * 1024
                    ? (f.size / (1024 * 1024)).toFixed(1) + ' MB'
                    : f.size > 1024
                    ? (f.size / 1024).toFixed(0) + ' KB'
                    : f.size + ' B';

                a.innerHTML = `<span>${name}</span><span class="meta">${size}</span>`;
                li.appendChild(a);
                ul.appendChild(li);
            });

            el.innerHTML = '';
            el.appendChild(ul);
        }

        function filterFiles() {
            const q = document.getElementById('search').value.toLowerCase();
            renderFiles(allFiles.filter(f => f.name.toLowerCase().includes(q)));
        }

        loadFiles();
    </script>
</body>
</html>
